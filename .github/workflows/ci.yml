name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: PHP syntax lint (all .php files)
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "All PHP files passed syntax check."

  composer-validate:
    name: Composer Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [php-lint, composer-validate]
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: globexsky_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_mysql
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_NAME=.*/DB_NAME=globexsky_test/' .env
          sed -i 's/DB_USER=.*/DB_USER=root/' .env
          sed -i 's/DB_PASS=.*/DB_PASS=root/' .env

      - name: Import schema
        run: |
          mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema.sql
          if [ -f database/schema_v2.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v2.sql
          fi
          if [ -f database/schema_v3.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v3.sql
          fi
          if [ -f database/schema_v4.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v4.sql
          fi
          if [ -f database/schema_v5.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v5.sql
          fi
          if [ -f database/schema_v7.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v7.sql
          fi
          if [ -f database/schema_v8.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v8.sql
          fi
          if [ -f database/schema_v5_kyc.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v5_kyc.sql
          fi
          if [ -f database/schema_v9.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v9.sql
          fi
          if [ -f database/schema_v10.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v10.sql
          fi
          if [ -f database/schema_v11.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v11.sql
          fi
          if [ -f database/schema_v12_variations.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v12_variations.sql
          fi
          if [ -f database/schema_v13_categories.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v13_categories.sql
          fi
          if [ -f database/schema_v14_checkout.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v14_checkout.sql
          fi
          if [ -f database/schema_v14_orders.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v14_orders.sql
          fi
          if [ -f database/schema_v15_commission.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v15_commission.sql
          fi
          if [ -f database/schema_v15_plans.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v15_plans.sql
          fi
          if [ -f database/schema_v15_addons.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v15_addons.sql
          fi
          if [ -f database/schema_v16_payouts.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v16_payouts.sql
          fi
          if [ -f database/schema_v16_tax.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v16_tax.sql
          fi
          if [ -f database/schema_v16_coupons.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v16_coupons.sql
          fi
          if [ -f database/schema_v17_carry.sql ]; then
            mysql -h 127.0.0.1 -u root -proot globexsky_test < database/schema_v17_carry.sql
          fi

      - name: Run smoke tests
        run: php tests/smoke.php
